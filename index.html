<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">GamePortal</div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="arcade.html">Arcade</a>
        </nav>
    </header>

    <main class="container">
        <h2>Featured Games</h2>
        <div class="game-grid">
            <div class="game-card">
                <div class="thumbnail-placeholder">Game 1 Thumbnail</div>
                <h3>Space Adventure</h3>
                <p>Explore the stars in this text adventure.</p>
                <a href="arcade.html?game=space" class="play-btn">Play Now</a>
            </div>

            <div class="game-card">
                <div class="thumbnail-placeholder">Game 2 Thumbnail</div>
                <h3>Clicker Mania</h3>
                <p>Click your way to the top leaderboard.</p>
                <a href="arcade.html?game=clicker" class="play-btn">Play Now</a>
            </div>
        </div>
    </main>

</body>
</html>
